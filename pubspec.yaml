name: yalla_pay_sudan
description: "Flutter SDK for YallaPaySudan payment gateway. Supports one-time payments, subscriptions, webhook verification, and in-app WebView checkout."
version: 1.0.0
homepage: https://yallapaysudan.com
topics:
  - payment
  - payment-gateway
  - sudan
  - webview

environment:
  sdk: ^3.10.4
  flutter: ">=3.22.0"

dependencies:
  flutter:
    sdk: flutter
  dio: ^5.9.0
  crypto: ^3.0.6
  equatable: ^2.0.7
  webview_flutter: ^4.10.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  mocktail: ^1.0.4
